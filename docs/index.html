<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老六的计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 14px 28px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .feature {
            background: #f8f9fa;
            padding: 20px 15px;
            border-radius: 10px;
        }

        .feature h3 {
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .feature p {
            color: #7f8c8d;
            font-size: 0.85rem;
        }

        footer {
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #95a5a6;
            font-size: 0.85rem;
        }

        footer a {
            color: #3498db;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 2rem;
            }

            .features {
                grid-template-columns: 1fr;
            }

            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧮 老六的计算器</h1>
        <p class="subtitle">简洁实用的网页计算器</p>

        <div class="buttons">
            <a href="https://hhxxhzy.github.io/laoliu-calculator/" class="btn btn-primary">🚀 开始计算</a>
            <a href="https://github.com/hhxxhzy/laoliu-calculator" class="btn">📁 源码</a>
        </div>

        <div class="features">
            <div class="feature">
                <h3>🎯 四则运算</h3>
                <p>加减乘除 + 百分比</p>
            </div>
            <div class="feature">
                <h3>📱 响应式</h3>
                <p>手机平板电脑全适配</p>
            </div>
            <div class="feature">
                <h3>⌨️ 键盘操作</h3>
                <p>快捷键支持</p>
            </div>
            <div class="feature">
                <h3>💾 历史记录</h3>
                <p>自动保存计算历史</p>
            </div>
        </div>

        <footer>
            <p>© 2026 老六的计算器 · <a href="https://github.com/hhxxhzy/laoliu-calculator">GitHub</a></p>
        </footer>
    </div>
</body>
</html>
